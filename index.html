<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game App</title>
  <link rel="stylesheet" href="app.css"/>
</head>

<body>

  <header>
    <h1 class="logo">
      <img 
        src="https://static1.squarespace.com/static/61fd2c9026a58c435d260f4c/t/653f77ecf6d752776e1b1050/1698658284825/SC-logo-2023-transparant-BG+Small+Crop.png?format=1500w" 
        alt="Game App logo"
      >
    </h1>
  </header>

  <!-- CONTROLS -->
  <section class="controls">

    <input 
      id="search-input" 
      type="text" 
      placeholder="Søg spil..."
    />

    <select id="genre-select">
      <option value="all">Alle genrer</option>
    </select>

    <select id="sort-select">
      <option value="title">Sortér efter titel</option>
      <option value="year">Sortér efter år</option>
      <option value="rating">Sortér efter rating</option>
    </select>

  </section>

  <!-- TEXT UNDER HEADER -->
  <p id="movie-count" class="movie-count"></p>

  <!-- GRID -->
  <main>
    <section id="movie-list" class="movie-grid"></section>
  </main>

  <!-- DIALOG -->
  <dialog id="movie-dialog">
    <div id="dialog-content"></div>

    <form method="dialog">
      <button>Luk</button>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
