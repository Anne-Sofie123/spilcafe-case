<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game App</title>
  <link rel="stylesheet" href="app.css"/>
</head>

<body>

  <header>
    <h1 class="logo">🎮 Game App</h1>
    <p>Søg, filtrér og sortér spil</p>
  </header>

  <!-- CONTROLS -->
  <section class="controls">

    <!-- SØGNING -->
    <input 
      id="search-input" 
      type="text" 
      placeholder="Søg spil..."
    />

    <!-- GENRE -->
    <select id="genre-select">
      <option value="all">Alle genrer</option>
    </select>

    <!-- SORTERING -->
    <select id="sort-select">
      <option value="title">Sortér efter titel</option>
      <option value="year">Sortér efter år</option>
      <option value="rating">Sortér efter rating</option>
    </select>

  </section>

  <!-- COUNT -->
  <p id="movie-count" class="movie-count"></p>

  <!-- GRID -->
  <main>
    <section id="movie-list" class="movie-grid"></section>
  </main>

  <!-- DIALOG -->
  <dialog id="movie-dialog">
    <div id="dialog-content"></div>

    <form method="dialog">
      <button>Luk</button>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
